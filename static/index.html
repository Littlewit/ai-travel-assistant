<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能 AI 旅游助手</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
    <!-- 引入 marked.js 用于解析 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; /* 防止背景滚动 */
        }
        .chat-container { 
            width: 90%; /* 宽度占屏幕 90% */
            max-width: 1000px; /* 最大宽度限制，防止在大屏上太宽 */
            height: 100vh; /* 高度占屏幕 100% */
            background: white; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.12); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        .chat-header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            padding: 20px; 
            text-align: center; 
            font-weight: 600; 
            font-size: 20px; 
            letter-spacing: 1px; 
            flex-shrink: 0; /* 头部不压缩 */
        }
        .chat-messages { 
            flex: 1; /* 占据剩余所有空间 */
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: #fafafa; 
        }
        .message { 
            max-width: 85%; 
            padding: 12px 18px; 
            border-radius: 18px; 
            font-size: 16px; 
            line-height: 1.6; 
            word-wrap: break-word; 
        }
        .user-message { 
            align-self: flex-end; 
            background: #667eea; 
            color: white; 
            border-bottom-right-radius: 4px; 
            box-shadow: 0 2px 5px rgba(102, 126, 234, 0.3); 
        }
        .ai-message { 
            align-self: flex-start; 
            background: white; 
            color: #333; 
            border: 1px solid #e0e0e0; 
            border-bottom-left-radius: 4px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
        }
        /* Markdown 样式微调 */
        .ai-message p { margin: 0 0 10px 0; }
        .ai-message p:last-child { margin-bottom: 0; }
        .ai-message ul, .ai-message ol { margin: 0 0 10px 0; padding-left: 20px; }
        .input-area { 
            padding: 20px; 
            border-top: 1px solid #eee; 
            display: flex; 
            gap: 12px; 
            background: white; 
            flex-shrink: 0; /* 输入框不压缩 */
        }
        input { 
            flex: 1; 
            padding: 15px 20px; 
            border: 1px solid #ddd; 
            border-radius: 25px; 
            outline: none; 
            transition: border-color 0.3s; 
            font-size: 16px;
        }
        input:focus { border-color: #667eea; }
        button { 
            padding: 15px 30px; 
            background: #667eea; 
            color: white; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer; 
            transition: all 0.3s; 
            font-weight: 600; 
            font-size: 16px;
        }
        button:hover { background: #5a6fd6; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">🌍 智能 AI 旅游助手</div>
        <div class="chat-messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入您的旅游需求..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        // 生成或从本地存储获取 session_id
        let sessionId = localStorage.getItem('travel_assistant_session_id');
        if (!sessionId) {
            sessionId = crypto.randomUUID();
            localStorage.setItem('travel_assistant_session_id', sessionId);
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'user-message', false);
            input.value = '';

            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai-message';
            aiDiv.textContent = "🤖 正在为您规划行程..."; 
            document.getElementById('messages').appendChild(aiDiv);
            scrollToBottom();

            let fullContent = "";

            try {
                const response = await fetch('/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, session_id: sessionId })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                
                                if (data.session_id) {
                                    sessionId = data.session_id;
                                    localStorage.setItem('travel_assistant_session_id', sessionId);
                                    continue;
                                }

                                const token = data.content;
                                if (token) {
                                    fullContent += token;
                                    // 【关键修改】：每次收到新内容都重新渲染 Markdown
                                    // marked.parse 现在非常高效，可以支持实时渲染
                                    aiDiv.innerHTML = marked.parse(fullContent);
                                    scrollToBottom();
                                }
                            } catch (e) {
                                console.error("解析错误:", e, line);
                            }
                        }
                    }
                }
                
                // 确保最后一次渲染是完整的
                aiDiv.innerHTML = marked.parse(fullContent);
                scrollToBottom();

            } catch (error) {
                aiDiv.textContent = "抱歉，网络连接出现了一点问题。";
            }
        }

        function addMessage(text, className, isMarkdown = true) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.innerHTML = isMarkdown ? marked.parse(text) : text;
            document.getElementById('messages').appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            const messages = document.getElementById('messages');
            messages.scrollTop = messages.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
